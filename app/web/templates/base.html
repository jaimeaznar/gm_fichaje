<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fichajes Global Meats{% endblock %}</title>
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/vendor/alpine.min.js" defer></script>
  <style>
    :root { --fg:#1a1a1a; --muted:#666; --bg:#f5f5f5; --card:#fff; --accent:#1d6f42;
            --danger:#b00020; --border:#ddd; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           margin:0; color:var(--fg); background:var(--bg); }
    header { background:var(--accent); color:#fff; padding:.8rem 1.2rem;
             display:flex; justify-content:space-between; align-items:center; }
    header a { color:#fff; text-decoration:none; margin-left:1rem; }
    main { max-width: 860px; margin: 1.5rem auto; padding: 0 1rem; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:8px;
            padding:1.2rem; margin-bottom:1rem; }
    h1,h2 { margin-top:0; }
    label { display:block; margin:.6rem 0 .2rem; font-weight:600; }
    input, select { padding:.5rem; font-size:1rem; border:1px solid var(--border);
                    border-radius:6px; width:100%; max-width:320px; }
    button { padding:.55rem 1.1rem; font-size:1rem; border:0; border-radius:6px;
             background:var(--accent); color:#fff; cursor:pointer; margin:.2rem .3rem .2rem 0; }
    button.secondary { background:#555; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    table { border-collapse: collapse; width:100%; }
    th, td { border:1px solid var(--border); padding:.4rem .6rem; text-align:left;
             font-size:.92rem; }
    th { background:#eee; }
    .muted { color:var(--muted); font-size:.9rem; }
    .error { color:var(--danger); font-weight:600; }
    .ok { color:var(--accent); font-weight:600; }
    .pill { display:inline-block; padding:.15rem .5rem; border-radius:999px;
            background:#eef; font-size:.8rem; }
    .pin-box { font-size:1.6rem; letter-spacing:.3rem; font-weight:700;
               background:#fffae6; border:1px dashed #cc0; padding:.6rem 1rem;
               display:inline-block; border-radius:6px; }
  </style>
</head>
<body>
  <header>
    <strong>Fichajes Global Meats</strong>
    <nav>
      {% if claims %}
        <a href="/fichar">Fichar</a>
        <a href="/mis-registros">Mis registros</a>
        {% if claims.role in oversight_roles %}<a href="/admin">Administración</a>{% endif %}
        <a href="/logout">Salir</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
