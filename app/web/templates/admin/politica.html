{% extends "base.html" %}
{% block title %}Política de tiempo — Administración{% endblock %}
{% block content %}
<h1>Política de tiempo</h1>
{% if message %}<p class="ok">{{ message }}</p>{% endif %}
{% if error %}<p class="error">{{ error }}</p>{% endif %}

<div class="card">
  <form method="post" action="/admin/politica">
    <label><input type="checkbox" name="pause_computable_default" value="true"
      style="width:auto" {% if policy.pause_computable_default %}checked{% endif %}>
      Por defecto, las pausas se descuentan del tiempo efectivo (no cuentan como tiempo trabajado)</label>

    <label for="computation_period">Periodo de cómputo</label>
    <select id="computation_period" name="computation_period">
      {% for p in periods %}
        <option value="{{ p }}" {% if policy.computation_period == p %}selected{% endif %}>{{ p }}</option>
      {% endfor %}
    </select>

    <label for="ordinary_hours_per_period">Horas ordinarias por periodo</label>
    <input id="ordinary_hours_per_period" name="ordinary_hours_per_period" type="number"
           step="0.5" min="0" value="{{ policy.ordinary_hours_per_period }}">

    <label for="desconexion_start">Inicio de ventana laboral (desconexión, opcional)</label>
    <input id="desconexion_start" name="desconexion_start" type="time"
           value="{{ policy.desconexion_start.strftime('%H:%M') if policy.desconexion_start else '' }}">

    <label for="desconexion_end">Fin de ventana laboral (desconexión, opcional)</label>
    <input id="desconexion_end" name="desconexion_end" type="time"
           value="{{ policy.desconexion_end.strftime('%H:%M') if policy.desconexion_end else '' }}">

    <div style="margin-top:1rem"><button type="submit">Guardar</button></div>
  </form>
</div>
{% endblock %}
