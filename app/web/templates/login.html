{% extends "base.html" %}
{% block title %}Acceso — Fichajes Global Meats{% endblock %}
{% block content %}
<div class="card" x-data="{ pin: '' }">
  <h1>Acceso</h1>
  <p class="muted">Introduce tu código de empleado y tu PIN de 6 dígitos.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label for="employee_code">Código de empleado</label>
    <input id="employee_code" name="employee_code" autocomplete="username"
           value="{{ remembered_code or '' }}" required autofocus>

    <label for="pin">PIN</label>
    <input id="pin" name="pin" type="password" inputmode="numeric" pattern="\d{6}"
           maxlength="6" autocomplete="off" x-model="pin" required>

    <div style="margin-top:1rem">
      <button type="submit" :disabled="pin.length !== 6">Entrar</button>
    </div>
  </form>
</div>
{% endblock %}
