services:
  db:
    image: postgres:16
    container_name: fichajes-db
    environment:
      POSTGRES_USER: fichajes
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: fichajes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fichajes -d fichajes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: